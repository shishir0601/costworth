<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CostWorth — cost per outcome, not cost per token</title>
  <meta name="description" content="Log LLM usage sessions with an outcome and see what your spend actually bought you, not just what it cost." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='7' y='3' width='18' height='26' rx='1' fill='%231e1b19'/%3E%3Cpath d='M7 27l2-2 2 2 2-2 2 2 2-2 2 2 2-2 2 2V3H7z' fill='%231e1b19'/%3E%3Ctext x='16' y='19' font-family='Georgia,serif' font-size='13' font-weight='700' fill='%23d3a355' text-anchor='middle'%3E%24%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="logo">Cost<span class="logo-accent">Worth</span></h1>
    <p class="tagline">Cost per token tells you what you spent. Cost per outcome tells you what it was worth.</p>
  </header>

  <main class="layout">
    <section class="col">
      <div class="card">
        <h2 class="card-title">Log a session</h2>
        <p class="edit-indicator" id="edit-indicator" hidden>Editing a previous entry</p>
        <label class="field"><span>What were you doing</span><input id="s-desc" type="text" placeholder="Debugging the payment webhook" autocomplete="off" /></label>
        <div class="field-row">
          <label class="field"><span>Category</span><input id="s-category" type="text" placeholder="coding" list="cat-list" autocomplete="off" /><datalist id="cat-list"></datalist></label>
          <label class="field"><span>Outcome</span>
            <select id="s-outcome">
              <option value="completed">Completed</option>
              <option value="partial">Partial progress</option>
              <option value="wasted">Wasted / went nowhere</option>
            </select>
          </label>
        </div>
        <div class="cost-toggle" role="tablist" aria-label="Cost entry mode">
          <button class="toggle-btn active" data-mode="tokens" type="button">By tokens</button>
          <button class="toggle-btn" data-mode="direct" type="button">By $ amount</button>
        </div>
        <div id="tokens-inputs">
          <label class="field"><span>Model</span><select id="s-model"></select></label>
          <div class="field-row">
            <label class="field"><span>Input tokens</span><input id="s-input-tok" type="number" min="0" placeholder="12000" /></label>
            <label class="field"><span>Output tokens</span><input id="s-output-tok" type="number" min="0" placeholder="3000" /></label>
          </div>
        </div>
        <div id="direct-inputs" hidden>
          <label class="field"><span>Cost ($)</span><input id="s-cost" type="number" min="0" step="0.01" placeholder="1.20" /></label>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="log-session" type="button">Log session</button>
          <button class="btn btn-ghost" id="cancel-edit" type="button" hidden>Cancel</button>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">Recent sessions <span class="count" id="session-count"></span></h2>
        <div class="filter-row">
          <select id="filter-outcome" aria-label="Filter by outcome">
            <option value="">All outcomes</option>
            <option value="completed">Completed</option>
            <option value="partial">Partial</option>
            <option value="wasted">Wasted</option>
          </select>
          <select id="filter-category" aria-label="Filter by category">
            <option value="">All categories</option>
          </select>
          <a class="export-link" id="export-link" href="/api/sessions/export.csv" download title="Export the filtered list as CSV">Export</a>
        </div>
        <ul class="session-list" id="session-list"></ul>
      </div>
    </section>

    <section class="col">
      <div class="ledger" id="ledger">
        <div class="ledger-inner">
          <div class="ledger-head-row">
            <p class="ledger-head">STATEMENT <span class="ledger-closed-badge" id="ledger-closed-badge" hidden>· closed</span></p>
            <div class="ledger-nav">
              <button class="nav-btn" id="month-prev" type="button" aria-label="Previous month">‹</button>
              <span class="ledger-stamp-date" id="ledger-date"></span>
              <button class="nav-btn" id="month-next" type="button" aria-label="Next month">›</button>
            </div>
          </div>
          <div class="ledger-hero" id="ledger-hero">
            <span class="ledger-hero-value" id="hero-value">—</span>
            <span class="ledger-hero-label">per completed task</span>
          </div>
          <div class="ledger-tear" aria-hidden="true"></div>
          <div id="outcome-breakdown"></div>
          <div class="ledger-rule"></div>
          <p class="ledger-sub">BY CATEGORY</p>
          <div id="category-breakdown"></div>
          <div class="ledger-rule"></div>
          <div id="forecast-section"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
